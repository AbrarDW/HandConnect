<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HandConnect - Advanced Hand Tracking AR</title>
    <meta name="description" content="Experience advanced hand tracking AR with neon effects">
    <link rel="stylesheet" href="src/assets/styles.css">
  </head>
  <body>
    <div id="app"></div>

    <!-- MediaPipe bundles from unpkg CDN -->
    <script src="https://unpkg.com/@mediapipe/hands/hands.js" defer></script>
    <script src="https://unpkg.com/@mediapipe/drawing_utils/drawing_utils.js" defer></script>
    <script defer>
      // Initialize MediaPipe Hands and expose on window
      const hands = new Hands({
        locateFile: (file) => `https://unpkg.com/@mediapipe/hands@0.4.1675469240/${file}`,
      });
      window.hands = hands;

      // Expose drawing utils
      const drawingUtils = new DrawingUtils();
      window.drawingUtils = drawingUtils;
    </script>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
